<!DOCTYPE html>
<html>
<head>
    <title>Test Boutons Notifications</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #8B1538; color: white; border: none; border-radius: 5px; font-size: 16px; }
        .test-button:hover { background: #6d0e2a; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test des Boutons d'Envoi Email</h1>
    
    <button class="test-button" onclick="testButton1()">Test 1: getStatus()</button>
    <button class="test-button" onclick="testButton2()">Test 2: sendTestEmail()</button>
    <button class="test-button" onclick="testButton3()">Test 3: sendDaily Report()</button>
    <button class="test-button" onclick="testButton4()">Test 4: Direct /notifications page</button>
    
    <div id="results"></div>
    
    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'result ' + (type === 'error' ?'error' : 'success');
            div.textContent = message;
            document.getElementById('results').appendChild(div);
            console.log(message);
        }
        
        function testButton1() {
            log("⏳ Test 1: Appel /api/email/status...", "info");
            fetch('/api/email/status')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        log("✓ Test 1 PASS: " + JSON.stringify(data), "success");
                    } else {
                        log("✗ Test 1 FAIL: " + JSON.stringify(data), "error");
                    }
                })
                .catch(e => log("✗ Test 1 Exception: " + e, "error"));
        }
        
        function testButton2() {
            log("⏳ Test 2: Appel /api/email/send-test...", "info");
            const payload = { recipient: "20firmino09@gmail.com" };
            fetch('/api/email/send-test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        log("✓ Test 2 PASS: Email sent", "success");
                    } else {
                        log("✗ Test 2 FAIL: " + data.error, "error");
                    }
                })
                .catch(e => log("✗ Test 2 Exception: " + e, "error"));
        }
        
        function testButton3() {
            log("⏳ Test 3: Appel /api/email/send-report...", "info");
            const payload = { type: "daily" };
            fetch('/api/email/send-report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        log("✓ Test 3 PASS: " + data.message, "success");
                    } else {
                        log("✗ Test 3 FAIL: " + data.error, "error");
                    }
                })
                .catch(e => log("✗ Test 3 Exception: " + e, "error"));
        }
        
        function testButton4() {
            log("⏳ Test 4: Navigation vers /notifications...", "info");
            window.location.href = '/notifications';
        }
    </script>
</body>
</html>
